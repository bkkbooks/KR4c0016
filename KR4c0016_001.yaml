front:
  text: 唐皇甫冉詩集卷之一
  hash: sha256:79359579c8c7b36dec915e6fc95c69d7f582acb5983f6b47ef93c76705285d2e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0016_SBCK_001-1a}
body:
  text: 唐𥙷闕潤州皇甫冉茂政著刑部郎中江都蕭海校正四言古詩劉方平壁畫山墨妙無前性生壁先迴溪已失逺嶂猶連側徑樵客長林野煙青峯之外何處雲天五言古詩與張𥙷闕王錬師自徐方清路同舟中下扵臺頭寺留别趙員外裴𥙷闕同賦雜題一首朝朝春事晚泛泛行舟逺淮海思無窮悠揚煙景中幸將仙子去復與故人同高枕随流水輕㠶任逺風鍾聲野寺逈草色故城空送别高臺上徘徊共惆悵懸知白日斜定是猶相望屏風上各賦一物得携琴客不是向空林應當就磐石白雲知隠䖏芳草迷行迹如何祗役心見尔携琴客寄劉方平坐憶山中人窮棲事南畆煙霞相親外墟落今何有潘郞作賦年陶令辭官後逹生遺自適良願固無負田取潁水流樹入陽城口歳暮憂思盈離居不堪乆曽東逰以詩寄之出郭離言多迴車始知逺寂然層城暮更念前山轉緫轡越成皐浮舟背梁苑朝朝勞延首徃徃若在眼落日孤雲還邊愁迷楚關如何椒花發復對遊子顔古寺杉栝裏連檣洲渚間煙生海西岸雲見呉南山驚風掃蘆荻翻浪連天白正是揚㠶時偏逄江上客由来論佳句况乃惬所適嵳峩天姥峯翠色春更碧氣棲湖上雨月净剡中夕釣艇或相逄江蘺又堪摘迢迢始寕野蕪沒謝公宅朱槿摧列墉蒼苔偏幽石顧予任踈懶期尔振羽翮滄洲未可行湏售金門䇿崔十四宅各賦一物得簷柳官渡老風煙潯陽媚雲日漢將营前見胡笳曲中出復在此簷端重隂仲長室送叚明府遥夜此何其霜空殘杳靄方嗟異郷别蹔是同公㑹海林秋更踈野水寒猶大離人轉呉岫旅鴈從燕塞日夕望前期勞心白雲外酬楊侍御寺中見招貧居依柳市閑歩在蓮宫髙閤宜春雨長廊好嘯風誠如雙樹下豈比一丘中見諸姬學玉臺體艶唱召燕姬清絃侍盧女由來道姓秦誰不知家楚傳杯見目成結帶明心許寕辭玉輦迎自堪金屋貯朝朝作行雲襄王迷䖏所題裴二十一新園東郭訪先生西郊尋隠路乆爲江南客自有雲陽樹已得閑園心不知公府歩開門白日晚倚杖青山暮果熟任霜封籬踈從水度窮年常牽綴徃事皆淪惧唯見耦耕人朝朝自來去寄髙雲南徐風日好悵望毗陵道毗陵有故人一見恨無因獨戀青山乆唯令白髪新每嫌持手板時見着頭巾煙景臨寒食農仲春家貧仍嗜酒生事今何有芳草遍江南勞心憶携手送張南史効何記室體馬卿工詞賦位下年將暮謝客愛雲山家貧身不閑風波杳未極㡬䖏逢相識富貴人皆變誰能念貧賤岸有經霜草林有故年枝俱應待春色獨使客心悲送薛判官之越時難自多務識小亦求賢道路無辭逺雲山併在前樟亭待朝䖏已是越人煙賦得簷燕拂水競何忙傍簷如有意翻風去每逺帶雨歸偏䭾今君裁杏梁更欲年年去送魏中丞還河北寕知貴公子本是魯諸生上國風塵舊中司印綬荣辛勤戎旅事雪下護羗營又賦得越山三韻西陵猶隔水北岸巳春山獨鳥連天去孤雲伴客還柢應結茅字出入石林間送竇叔向楚客怨逄秋閑吟興非一弃官守貧病作賦推文律樵徑未沾霜茅簷𥘉負日今看泛月去偶見乗潮出卜地㑹爲鄰還依仲長室題髙雲客舎孤興日自深浮雲非所仰窻中惡城峻樹外東川廣晏起簮葛巾閑吟倚藜杖阮公道在醉荘子生常養五柳轉扶踈千峰恣來徃清秋香秔穫白露寒莱長呉國滯風煙平陵延夣想時人趍纓弁髙鳥違羅網世事徒亂紛吾心方浩蕩唯將山與水處處諧真賞之京留别劉方平客子慕儔侶含悽整晨装邀歡日不足况乃前期長離𬒮惜嘉月逺還劳折芳遲迴越二陵迴首但蒼茫喬木清宿雨故關愁夕陽人言長安樂其奈𬗟相望出塞吹角出塞門前瞻即胡地三軍盡回首皆洒望郷淚轉念関山長行看風景異由來征戌客負得輕生義酬裴十四得宴字淮海各聮翩三年方一見素心終不易玄髪何湏變舊國想平陵春山滿陽羡鄰鷄莫遽唱共惜良夜宴送鄭二貟外置酒竟長宵送君登逺道羈心看旅鴈晚泊依秋草秋草尚芊芊離憂亦渺然元戎辟才彦行子犯風煙風煙積惆悵淮楚殊飄蕩明日是重陽登髙逺相望唐皇甫曽詩集卷之一唐監察御史皇甫曾茂政著刑部郎中江都蕭海編校五言古詩贈霈禪南嶽滿湘源吾師經利渉身歸沃洲老名與支公接浄教傳荆呉道縁正漁獵觀空色不染對境心自愜室中人寂寞門外山稠疊天台積幽夢早晚當負笈五言律詩奉陪韋中丞使君遊鶴林寺古寺傳燈久層城閉閤閑香花同法侶旌斾入深山寒磬空虗裏孤雲起滅間謝公慞一作憶高臥徒御欲忘一作東還奉送杜侍御還罷戰回龍節朝天識鳯池寒生五湖道春及萬年枝召化一作郡多遺愛胡清一作官清已畏知懐恩偏感別墮淚向旌麾酬鄭侍御秋夜見寄揺落空林夜河陽興已生未一作欲辭公府照知結逺山情髙柳風難定寒泉月助明袁公方卧雪尺素及柴荆送普上人還陽羡一作皇甫冉花宫難久别道者憶千燈殘雪入林路暮山歸寺僧日光依嫩草泉響滴春氷何用求方便看心是一乗送李中丞歸本道上將宜分閫雙旌復去一作出秦關河三晋路賔從五原人碣石山通海滹沲雪度春酬㤙看玉劍何處有烟塵一作孤戍雲連海平沙雪度春和謝舎人雪夜寓直禁省夜沉沉春風雪滿林滄洲歸客夢青瑣近臣心揮翰宣鳴玉承恩在錫金建章寒漏起更助掖垣深傷陸䖏士從此無期見柴門對雪開二毛逢世難萬恨掩泉臺返照空堂夕孤城吊客廻漢家偏訪道猶畏鶴書來烏程水楼留别悠然千里去惜此一尊同客散髙樓上㠶飛細雨中川程随逺水楚思望青楓共說前期易滄波處處通西陵寄二公又見冉集題與尾句不同西陵遇風䖏一作雨自古是通津終日空江上雲山若待人汀洲寒事早魚鳥興情新西望稽山路吾心有所親題贈呉門邕上人春山唯一作臨一室獨坐草萋萋身寂心成道花閑一作開鳥自啼細泉松徑裏返景竹林西晚與門人别依依出虎谿送著公歸越一作未誰能愁此别到越㑹相逢長憶雲門寺門前千萬峯石床埋積雪山路倒枯松莫學白道士無人知去蹤送陸鴻漸山人採茶廻千峯待逋客香茗復叢生採摘知深䖏烟霞羡獨行幽期山寺遠野飯石泉清寂寂然燈夜相思磬一聲寄劉員外長卿南憶新安郡千山帶夕陽断猿知夜久秋草助江長踈髪應成素青松獨耐霜愛才稱漢主題柱待囬郷寄張衆甫悲風還一作生舊浦雲迷隔東田伏臘同鷄黍柴門閉雪天孤村明夜火稚子候歸舡静者心相憶離居畏度年送元侍御充使湖南雲夢南行尽三湘萬里流山川重分首徒御亦悲秋白簡勞王事青猿助客愁離群復多病歲晚憶滄洲晚至華隂臘盡促歸心行人及華隂雲霞仙掌出松栢古祠深野渡氷生岸寒川燒隔林温泉看漸近宫樹晚沉沉送孔徴士谷口幽一作山多䖏君歸不可尋家貧清史在身老白雲深掃雪開松徑䟽泉過竹林余生負丘壑相送亦何心秋興流螢與落葉秋晚共紛紛返照城中盡寒砧雨外聞離人見衰鬂獨鶴慕何群生容在千里相思看碧雲送歸中丞使新羅南憲衘㤙去東夷泛海行天遥辭上國水盡到孤城已變炎涼氣仍愁浩淼程雲濤不可極來徃見雙旌送少㣲上人東南逰石梁人不到獨徃更迢迢乞食山家少尋鐘野寺遥松門風自掃瀑布雪難消秋夜聞清𣑽餘音逐海潮送韋判官赴閩中孤棹閩中客双旌海上軍路人從北少嶺水向南分野鶴傷情别林猿忌夜聞漢家崇亞相知子遠邀勲送人徃荆州草色随騘馬悠悠同出秦水傳雲夢曉山接洞庭春㠶影連三峽猿聲近四鄰青門一分首難見杜陵人寄浄虚上人𥘉至雲門寒蹤白雪裏法侣自提携竹徑通城下松門隔水西方同沃州去不似武陵迷髣髴心知䖏高峯是㑹稽尋劉䖏士㡬年人不見林下掩柴関留客當清夜逢君話舊山隔城寒杵急帶月早鴻還南陌雖相近其如隱者閑遇劉員外長卿别墅謝客開山後郊扉積水通江湖千里别衰老一樽同返照寒川滿平田暮雪空滄洲自有趣不復哭途窮五言排律春和杜相公移入長興宅奉呈諸宰執欲向幽偏適還從絶地移秦官䁀食貴堯丗土階卑㦸户槐隂滿堂牎竹葉垂纔分午夜漏遥隔萬年枝北闕深恩在東林遠夢知日斜門掩映山逺樹參差論道齊鴛一作鵉翼題詩憶鳯池從公亦何幸長與珮聲随贈監上人律儀傳教誘僧臘老烟霄樹色依禪誦泉聲入寂寥寳龕經末刼畫壁見南朝深竹風開合寒潭月動揺息心歸静理愛道坐中宵更欲尋真去乗船泝海潮送湯中丞和蕃継好中司出天心外國知已傳堯雨露更說漢威儀隴上應回首河源復載馳孤峯問徒御空磧見旌麾春草郷愁起邊城旅夢移莫嗟行地逺此去荅恩私送和西蕃使白簡𥘉分命黄金已在腰恩華通外國徒御發中朝雨雪從邉起旌旗上隴遥暮天沙漠漠空礫馬蕭蕭寒路随河水關城見柳條和戎先罷戦知勝霍嫖姚送王相公赴幽州台衮兼戎律勤憂秉化元鳯池東掖寵龍節北方尊長路山河轉前驅鼓角喧人安布時令地逺荅君㤙暮日平沙淡秋風大斾翻漁陽在天末戀别信陵門送徐大夫赴南海舊國當分閫天涯荅聖私大軍傳羽檄老將拜旌旗位重登壇後恩深掛印時何年諌獵賦今日飲泉詩海内求民瘼城隅見島夷由來黄覇去自有上台期七言律詩早朝日寄所知一作皇甫冉長安歳後見歸鴻紫禁朝天拜舞同曙色漸分雙闕下漏聲常遥在百花中爐烟乍起開仙仗玉佩成行引上公共荷發生同雨露不應黄葉久從風秋夕寄懐契上人已見槿花朝委露獨悲孤鶴在人群真僧出世心無事静夜名香手自焚窓臨絶澗同流水客至孤峯掃白雲更想清晨誦經處獨看松上雪紛紛張芬見訪郊居作林中雨散早涼生已有迎秋促織聲三徑荒蕪羞對客十年衰老愧稱兄愁心自惜江蘺晚一作短世事方看木槿荣君若罷官携手去尋山莫計白雲程奉寄中書王舎人腰金載筆謁承明至道安禪得此生西掖㡬年綸綍貴東山遥夜薜蘿情風傳漏刻星河曙月上梧桐雨露清聖主好文誰爲薦閉門空賦子虗成五言絶句洛中口號還郷不見家年老眼多淚車馬上河橋城中好天氣山下泉漾漾帶山光澄澄倒林影那知石上喧却憶山中静七言絶句酧竇拾遺秋日見呈時此公自江隂令除諌官孤城永巷時相見衰柳閑門日半斜欲送近臣朝魏闕獨憐殘菊在陶家韋使君宅海榴詩淮陽臥裏有清風臘月榴花帶雪紅閉閤寂寥常對此江湖心在数枝中㟧嶺四望漢家仙仗在咸陽洛水東流出建章野老至今猶望幸離宫晚樹獨蒼蒼皇甫冉詩補遺逢莊納因贈世故還相見天涯共向東春歸江海上人老別離中郡吏名何晩沙鷗道自同甘泉須早獻且莫歎飄蓬送鄭秀才貢舉全唐詩作皇甫曾詩西去意如何知隨貢士科吟詩向月路驅馬出煙蘿晩色寒蕪遠秋聲候鴈多自憐歸未得相送一勞歌右見唐詩百家題竹扇贈別湘竹殊堪製齊紈且未工幸親芳袖日猶帶舊林風掩笑歌筵裏傳書臥閣中竟將爲別贈寧與合歡同怨回紇歌白首南朝女愁聽異域歌收兵頡利國飮馬胡蘆河毳布腥膻久穹廬歲月多雕巢城上宿吹笛淚滂沱其二祖席駐征櫂開帆信候潮隔煙桃葉泣吹管杏花飄船去鷗飛閣人歸塵上橋別離惆悵淚江路濕紅蕉春思鶯啼燕語報新年馬邑龍堆路幾千家住秦城鄰漢苑心隨明月到胡天機中錦字論長恨樓上花枝笑獨眠爲問元戎竇車騎何時反斾勒燕然韋中丞西廳海榴海花爭讓候榴花犯雪先開內史家末客朝朝鈴閣下從公步履玩年華右見全唐詩皇甫曾詩補遺目錄送韓司直五律一首遇風雨作五古一首錫杖歌送明楚上人歸佛川七古一首玉山嶺上作五律一首國子柳博士兼領太常博士輒申賀贈五律一首送裴秀才貢舉五律一首送商州杜中丞赴任七律一首贈老將七絕一首皇甫曾詩補遺送韓司直游吳還適越來往任風波復送王孫去其如芳草何岸明殘雪在潮滿夕陽多季子留遺廟停舟試一過右見活字本皇甫曾詩遇風雨作草草理夜裝涉江又登陸望路殊未窮指期今已促傳呼戒徒馭振轡轉林麓陰雲擁巖端霑雨當山腹震雷如在耳飛電來照目獸跡不敢窺馬蹄惟務速䖍心若齋禱濡體如沐浴萬竅相怒號百泉暗奔瀑危梁慮足跌峻坂憂車覆問我何以然前日愛微祿轉知人代事纓組乃徽束向若家居時安枕春夢熟遵途稍已近候吏來相續曉霽心始安林端見初旭錫杖歌送明楚上人歸佛川上人遠自西天至頭陀行遍南朝寺口翻貝葉古字經手持金策聲泠泠護法護身惟振錫石瀨雲溪深寂寂乍來松逕風露寒遙暎霜天月成魄後夜空山禪誦時寥寥挂在枯樹枝眞法嘗傳心不住東西南北隨緣路彿川此去何時迴應眞莫便遊天台玉山嶺上作悠悠驅匹馬征路上連岡晩翠深雲竇寒臺淨石梁秋花偏似雪楓葉不禁霜愁見前程遠空郊下夕陽國子柳博士兼領太常博士輙申賀贈博士本秦官求才帖職難臨風曲臺淨對月碧池寒講學分陰重齋祠曉漏殘朝衣辨色處雙綬更宜看送裴秀才貢舉儒衣羞此別去抵漢公卿賓貢年猶少篇章藝已成臨流惜暮景話別起鄕情離酌不辭醉西江春草生送商州杜中丞赴任安康地理接商於帝命專城總賦輿夕拜忽辭靑瑣闥晨裝獨捧紫泥書深山古驛分騶騎芳草閑雲逐隼旟綺皓淸風千古在因君一爲謝巖居贈老將白草黃雲塞上秋曾隨驃騎出幷州轆轤劍折虬髯白轉戰功多獨不侯右見全唐詩
