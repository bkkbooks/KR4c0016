front:
  text: 唐皇甫冉詩集卷之六
  hash: sha256:2ffa7d7b1f6f2df789cc6e2dae52bbade3f5fd5117e5ad992f39bc71f9ba6fec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0016_SBCK_006-1a}
body:
  text: 唐𥙷闕潤州皇甫冉茂政著五言絶句同諸公有懐舊國迷江樹他郷近海門移家南渡久童稚觧方言題畫帳二首山水桂水饒楓杉荆南足煙雨猶凝黛色中復是雒陽岨遠㠶朝見巴江客暮見巴山客雲㠶倘蹔停中路陽臺夕渡汝水向大和山落日事褰渉西南投一峰誠知秋水淺但怯無人踪秋怨長信多秋氣昭陽借月華那堪閉永巷聞道選良家山中五詠門柳接影武昌城分行漢南道何事閉門外空對青山老逺山少室盡西峰鳴臯隠南靣柴門縱復關終日窓中見南澗上路各乗軒高朋盡鳴玉寕知澗下人自愛輕波渌春草草偏潁陽山花開武陵水春色旣巳同人心亦相似山館山館長寂寂閑雲朝夕來空庭復何有落日照青苔同張侍御詠興寕寺經藏院海石榴嫩葉𥘉生茂殘花少更鮮結根龍藏側故欲抗青蓮送王司直西塞雲山逺東風道路長人心勝潮水相山半横雲湘水風日滿楚山朝夕空連峰雖已見猶念長雲中病中對石竹花散點空堦下閑凝細雨中那能久相伴嗟尔殢秋風送王翁信還剡中舊居海岸耕殘雪溪沙釣夕陽家中何所有春草漸看長送陸邃潜夫并序頃者江淮征鎮屢有掄材之舉子不列焉有司之過予方耕山釣湖避人如逃冦徒欲羅高鴻捕深魚窮年竭日其可得也今齒髪向暮執勞無力衆雛嗷嗷開口待哺如有知者子其行乎無爲自苦一絶賦之髙山逈欲登逺水深難渡杳杳復漫漫行人别家去楊氏林亭探得古槎千年古兒多八月秋濤晚偶𬒳主人留那知来近遠和王給事禁省棃花詠巧觧逢人笑還能亂蝶飛春時風入户㡬片落朝衣送陸鴻漸赴越序君自数百里訪予覉病牽力迎門握手心喜宜渉旬日始至焉究孔釋之名理窮歌詩之麗則逺墅孤島通舟必行漁梁釣磯随意而徃餘興未盡告云遐征夫越地稱山水之郷轅門當節鉞之重進可以自薦求試退可以閑居保和吾子所行盖不在此尚書郎鮑侯知子愛子者將推食觧衣以拯其極講徳㳺藝以凌其深豈徒嘗鏡水之魚宿耶溪之月而巳吾是以無間勸其晨装同賦送逺客一絶行随新樹深夢隔重江逺迢遞風日間滄茫洲渚晩臺頭寺願上人院古松下有小松栽毫末新生與纎草不辯重其有淩雲干霄之志與趙八員外裴十𥙷闕同賦之細草亦全高秋毫乍堪比及至干霄日何人復居此漁子溝寄趙員外裴𥙷闕欲逐淮潮上暫停漁子溝相望知不見終是屡廻頭同李三月夜作霜風驚度鴈月露皎踈林處處砧聲發星河秋夜深𥘉出沆江夜入湖放溜出江口廻瞻松栝深不知舟中月更引湖間心送裴陟歸常州夜雨湏停棹秋風暗入衣見君常北望何事復南歸洪澤舘壁見禮部尚書題詩底事洪澤壁空留黄絹詞年年淮水上行客不勝悲望南山雪懐山寺普上人夜夜夣蓮宫無由見逺公朝來出門望知在雪山中贈寄權三客舎南橋春日暮楊柳帶清渠不得同携手空成意有餘送李山人還從來無檢束只欲老煙霞鷄犬聲相應深山有㡬家六言附小江靈一上人江上年年春早津頭日日人行借問山隂遠近猶聞薄暮鍾聲奉寄皇甫𥙷闕又作張繼寄茂政京口情人别久揚州估客来踈潮去潯陽来去相思無處通書送鄭二之茅山水流絶澗終日草長深山暮春犬吠鷄鳴㡬處條桑種杏何人問李二司直所居雲山門外水流何䖏天邊樹遶誰家山色東西多少朝朝㡬度雲遮閑居又作王維詩桃紅復含宿雨柳緑更帶春煙花落家童未掃鶯啼山客猶眠
