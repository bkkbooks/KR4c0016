front:
  text: 唐皇甫冉詩集卷之四
  hash: sha256:8d33650d11a7c44a8b928867b2aa0cca9d99a9d7c9e116ded1ed71404c4a3cd9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0016_SBCK_004-1a}
body:
  text: 唐𥙷闕潤州皇甫冉茂政著五言排律酬張二仲彛呉洲見芳草楚客動歸心居宋郷山古荆衡煙雨深艱難十載别覉旅四愁侵澧月通沅水湘雲入桂林已看生白髪當爲乏黄金江海時相見唯聞梁甫吟荅張諲劉方平兼呈賀蘭廣野性難馴狎荒郊自閉門心閑同海鳥日夕巒山村屡枉瓊瑶贈如今道術存逺峯時振䇿春雨耐香源復有故人在寕聞簷鵲喧青青草色緑終是待王孫酬包評事壁畫山水見寄逹官知所傲本意在雲泉濡翰生新興群峰忽眼前黛中分遠近筆下起風煙岩翠深樵路湖光出釣船寒侵赤城頂日照武陵川若覧名山誌仍聞招隠篇遂令江海客惆悵憶閑田贈鄭山人白首滄洲客陶然得此生龎公採藥去莱氏與妻行乍見還州里全非隠姓名桂㠶臨海嶠貰酒秣陵城伐木呉山曉持竿越水清家人恣貧賤物外任衰荣忽爾辭林壑高歌至上京避喧心已慣念逺夣頻成石路寒花發江田臘雪明玄纁儻有命何以遂躬耕河南鄭少尹城南亭送鄭判官還河東使臣懐餞席亞尹有前溪客是仙舟裏途從御苑西泉聲喧暗竹草色引長堤故綘青山在新田緑樹齊天秋聞别鵠關曉待鳴鷄應歎沉冥者年年津路迷登玄元廟古廟川原逈重門禁籞連海童紛翠盖羽客事瓊筵御路分踈柳離宫出苑田興新無向背望乆辯山川物外將遺老區中誓絶縁函關若逺近紫氣獨依然冬夜集賦得寒漏清冬洛陽客寒漏建章䑓出禁因風徹萦窓共月來偏將殘瀬雜乍與遠鴻哀遥夜重城警流年滴水催閑齋堪坐聽况有故人杯寄江東李判官遠懐不可道歷稔勌離憂洛下聞新鴈江南想暮秋澄清佐八使綱紀案諸侯地識呉平乆才當晋用求時賢㡬殂謝摛藻繼風流更有西陵作還成北固遊歸程限尺牘王事在扁舟山色臨湖盡猿聲入夣愁送從弟豫貶遠州何事成遷客思歸不見郷逰呉經萬里弔屈過三湘水與荆巫接山通鄢郢長名嗟黄綬繫身是白眉良獨結南枝恨應思北鴈行憂來沽楚酒玄髪莫凝霜太常魏慱士逺出賊庭江外相逢因叙其事烽火驚戎塞豺狼犯帝畿川原無稼穡日月翳光輝里社枌榆毀宫城騎吏非群生𬒳慘毒雜虜耀輕肥多士從芳餌唯君識禍機心同合浦葉命寄首陽薇耻作纎鱗煦方隨髙鳥飛山經啇嶺出水泛漢池歸離别霜凝鬂逄迎淚迸衣京華長路絶江海故人稀秉節身常苦求仁惠不違祗應窮野外耕種且相依上禮部楊侍郎郢匠掄材日轅輪必盡呈敢言當一幹徒欲􅊢諸生未學慚鄒魯深仁録弟兄餘波知可挹弱植更求榮績媿他年敗功期此日成方因舊桃李猶兾載飛鳴道淺猶懐分時移但自驚關門驚暮節林壑廢春耕十里嵩峯近千秋潁水清煙花迷戍谷墟落接陽城渺黙思郷夢遲迴知已情劳歌終此曲還是苦辛行宿嚴維宅送包七江湖同避地分守自依依盡室今爲客經秋空念歸歲儲無别墅寒服羡鄰機草色村橋晚蝉聲江樹稀夜涼冝共醉時難惜相違何事随陽侶汀洲忽背飛送李萬州赴饒州覲省得西字前程觀拜慶舊舘惜招携荀氏風流日胡家清白齊川迴呉岫失塞濶楚雲低舉目觀魚鳥驚心怯皷鼙人稀漁浦外灘沙定山西無限青青草王孫去不迷送鄒判官赴河南看君發原隰四牡去皇皇始罷滄江吏還隨粉署郎海沂軍未息河畔歲仍荒征稅人全少榛蕪虜近亡所行知宋逺相隔嘆淮長早晚裁書寄銀鈎釣八行送歸中丞使新羅詔使殊方逺朝儀舊典行浮天無盡處望日計前程暫喜孤山出長愁積水平野風飄疊皷海雨濕危旌異俗知文教通儒有令名還將大戴禮方外受諸生劉侍御朝命許停官歸侍孟孫唯問孝莱子復辭官幸遂温清願其丼稼穡難採芝供上藥拾槿奉晨飡棟裏雲藏雨山中暑帶寒非時因有筍閑地盡生蘭賜告承優詔長筵永日歡夜集張謹所居得飄字江南成乆客門舘日肅條唯有圗書在多傷鬂髪凋諸生陪講誦稚子給漁樵虗室寒燈静空堦落葉飄滄洲自有趣誰道隱湏招奉賀獨孤中丞逰法華寺謝君臨郡府越國舊山川訪道三千界當仁五百年岩空騶馭響樹宻斾旌連閤影臨空壁松聲助亂泉開門得𥘉地伏檻接諸天向背春光滿樓䑓古制全群峰争彩翠百谷㑹風煙香像随僧乆祥烏報客先清心乗暇日稽首慕良縁法證無生偈詩成大雅篇蒼生望已久迴駕獨依然閑居作多病辭官罷閑居作賦成圗書唯藥籙飲食止藜羔學謝淹中術詩無鄴下名不堪趍建禮詎是厭承明已輟金門歩方從石路行遠山期道士髙柳覔先生性懶尤因疾家貧自少营種苗雖尚短榖價幸全輕篇詠投康樂壼觴就歩兵何日肯相訪開户一逢迎送䖏州裴使君赴京使君朝北闕車騎發東方别喜天書召寕憂地脉長山行朝復夕水宿露爲霜秋草連秦塞孤㠶落漢陽新衘趨建禮舊位識文昌唯有東歸客應随南鴈翔和袁郎中破賦後經剡中山水武庫分帷幄儒衣事皷鼙兵連越徼外冦盡海門西節比全踈勒功當雪㑹稽旌旗迴剡嶺士馬濯靈溪受律梅𥘉發班師草未齊行㸔佩金印豈得訪丹梯送魏六侍御塟哭葬寒郊外行將何所從盛曹徒列栢新墓已栽松海月同千古江雲覆㡬重舊書曽諌獵遺草議登封疇昔輕三事常期老一峰門臨啇嶺道窓引洛城鐘應積泉中恨無因世上逢招尋偏見厚踈慢亦相容張范危通夣求羊永絶踪誰知長卿疾歌賦不還卭送王相公赴幽州一作韓翃詩黄閣開帷幄丹墀拜冕旒位髙湯左相權總漢諸侯不改周南化仍分趙北憂䨇旌過易水千騎入幽州塞草連天暮邊風動地秋無因陪遠道結束佩吳鈎東郊迎春曉見蒼龍駕東郊春㔾迎綵雲天仗合玄象太階平佳氣山川秀和風政令行勾陳霜騎肅御道雨師清律向韶陽變人随草木榮遥觀上林樹今日遇遷鶯華清宫驪岫接新豐岩嶤駕翠空鑿山開秘殿隠霧閉仙宫綘闕猶栖鳯彫梁尚帶虹温泉曽浴日華舘舊迎風肅穆瞻雲輦沉深閉綺櫳東郊倚望䖏瑞氣靄濛濛和鄭少尹祭中岳寺北訪蕭居士越上方肅事祠靈境尋真到隠居寅縁幽谷逺蕭散白雲餘晚節持僧律他年著道書海邊曽狎鳥濠上正觀魚寂静求無相淳和覩太𥘉一峰綿歲月萬姓任盈虗籬隔溪中度空臨澗水踈謝公懐舊壑迴駕復何如適荆州途次南陽贈何明府千里獨逰日有懐誰與同言過細陽令一遇朗陵公清節邁多士斯文傳古風閭閻知俗變原野識年豊吾道方在此前程殊未窮江天經峴北客思滿巴東夢渚夕愁逺山丘晴望通應嗟出䖏異流蕩楚雲中
