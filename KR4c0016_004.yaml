front:
  text: 唐皇甫冉詩集卷之四
  hash: sha256:8d33650d11a7c44a8b928867b2aa0cca9d99a9d7c9e116ded1ed71404c4a3cd9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0016_SBCK_004-1a}
body:
  text: 唐輔闕潤州皇甫冉茂政著五言排律酬張二仲彛吳洲見芳草楚客動歸心居宋鄉山古荆衡煙雨深艱難十載别羇旅四愁侵澧月通沅水湘雲入桂林已看生白髮當為乏黃金江海時相見唯聞梁甫吟答張諲劉方平兼呈賀蘭廣野性難馴狎荒郊自閉門心間同海鳥日夕巒山村屢枉瓊瑶贈如今道術存逺峯時振䇿春雨耐香源復有故人在寧聞簷鵲喧青青草色緑終是待王孫酬包評事壁畫山水見寄逹官知所傲本意在雲泉濡翰生新興群峰忽眼前黛中分遠近筆下起風煙岩翠深樵路湖光出釣船寒侵赤城頂日照武陵川若覽名山志仍聞招隱篇遂令江海客惆悵憶間田贈鄭山人白首滄洲客陶然得此生龎公採藥去萊氏與妻行乍見還州里全非隱姓名桂帆臨海嶠貰酒秣陵城伐木吳山曉持竿越水清家人恣貧賤物外任衰榮忽爾辭林壑高歌至上京避喧心已慣念逺夢頻成石路寒花發江田臘雪明玄纁儻有命何以遂躬耕河南鄭少尹城南亭送鄭判官還河東使臣懷餞席亞尹有前溪客是仙舟裏途從御苑西泉聲喧暗竹草色引長堤故綘青山在新田緑樹齊天秋聞别鵠關曉待鳴雞應歎沉冥者年年津路迷登玄元廟古廟川原逈重門禁籞連海童紛翠蓋羽客事瓊筵御路分踈柳離宫出苑田興新無向背望久辨山川物外將遺老區中誓絶緣函關若逺近紫氣獨依然冬夜集賦得寒漏清冬洛陽客寒漏建章臺出禁因風徹縈窗共月來偏將殘瀨雜乍與遠鴻哀遙夜重城警流年滴水催間齋堪坐聽况有故人杯寄江東李判官遠懷不可道歷稔倦離憂洛下聞新鴈江南想暮秋澄清佐八使綱紀案諸侯地識吳平久才當晉用求時賢幾殂謝摛藻繼風流更有西陵作還成北固遊歸程限尺牘王事在扁舟山色臨湖盡猿聲入夢愁送從弟豫貶遠州何事成遷客思歸不見鄉逰吳經萬里弔屈過三湘水與荆巫接山通鄢郢長名嗟黃綬繫身是白眉良獨結南枝恨應思北鴈行憂來沽楚酒玄髮莫凝霜太常魏慱士逺出賊庭江外相逢因敘其事烽火驚戎塞豺狼犯帝畿川原無稼穡日月翳光輝里社枌榆毀宫城騎吏非群生𬒳慘毒雜虜耀輕肥多士從芳餌唯君識禍機心同合浦葉命寄首陽薇耻作纎鱗煦方隨髙鳥飛山經啇嶺出水泛漢池歸離别霜凝鬢逄迎淚迸衣京華長路絶江海故人稀秉節身常苦求仁惠不違祗應窮野外耕種且相依上禮部楊侍郎郢匠掄材日轅輪必盡呈敢言當一幹徒欲􅊢諸生未學慚鄒魯深仁録弟兄餘波知可挹弱植更求榮績愧他年敗功期此日成方因舊桃李猶兾載飛鳴道淺猶懷分時移但自驚關門驚暮節林壑廢春耕十里嵩峯近千秋潁水清煙花迷戍谷墟落接陽城渺默思鄉夢遲回知已情勞歌終此曲還是苦辛行宿嚴維宅送包七江湖同避地分守自依依盡室今為客經秋空念歸歲儲無别墅寒服羡鄰機草色村橋晚蟬聲江樹稀夜涼冝共醉時難惜相違何事隨陽侶汀洲忽背飛送李萬州赴饒州覲省得西字前程觀拜慶舊館惜招携荀氏風流日胡家清白齊川回吳岫失塞濶楚雲低舉目觀魚鳥驚心怯鼓鼙人稀漁浦外灘沙定山西無限青青草王孫去不迷送鄒判官赴河南看君發原隰四牡去皇皇始罷滄江吏還隨粉署郎海沂軍未息河畔歲仍荒征稅人全少榛蕪虜近亡所行知宋逺相隔嘆淮長早晚裁書寄銀鈎釣八行送歸中丞使新羅詔使殊方逺朝儀舊典行浮天無盡處望日計前程暫喜孤山出長愁積水平野風飄疊鼓海雨濕危旌異俗知文教通儒有令名還將大戴禮方外受諸生劉侍御朝命許停官歸侍孟孫唯問孝萊子復辭官幸遂溫清願其井稼穡難採芝供上藥拾槿奉晨餐棟裏雲藏雨山中暑帶寒非時因有筍間地盡生蘭賜告承優詔長筵永日歡夜集張謹所居得飄字江南成久客門館日肅條唯有圗書在多傷鬢髮凋諸生陪講誦稚子給漁樵虗室寒燈靜空階落葉飄滄洲自有趣誰道隱須招奉賀獨孤中丞逰法華寺謝君臨郡府越國舊山川訪道三千界當仁五百年岩空騶馭響樹密斾旌連閣影臨空壁松聲助亂泉開門得𥘉地伏檻接諸天向背春光滿樓臺古制全群峰爭彩翠百谷會風煙香像隨僧久祥烏報客先清心乘暇日稽首慕良緣法證無生偈詩成大雅篇蒼生望已久回駕獨依然間居作多病辭官罷間居作賦成圗書唯藥籙飲食止藜羔學謝淹中術詩無鄴下名不堪趍建禮詎是厭承明已輟金門步方從石路行遠山期道士髙柳覔先生性懶尤因疾家貧自少營種苗雖尚短榖價幸全輕篇詠投康樂壼觴就步兵何日肯相訪開户一逢迎送處州裴使君赴京使君朝北闕車騎發東方别喜天書召寧憂地脈長山行朝復夕水宿露為霜秋草連秦塞孤帆落漢陽新銜趨建禮舊位識文昌唯有東歸客應隨南鴈翔和袁郎中破賦後經剡中山水武庫分帷幄儒衣事鼓鼙兵連越徼外冦盡海門西節比全踈勒功當雪會稽旌旗回剡嶺士馬濯靈溪受律梅𥘉發班師草未齊行看佩金印豈得訪丹梯送魏六侍御葬哭葬寒郊外行將何所從盛曹徒列柏新墓已栽松海月同千古江雲覆幾重舊書曽諌獵遺草議登封疇昔輕三事常期老一峰門臨啇嶺道窗引洛城鐘應積泉中恨無因世上逢招尋偏見厚踈慢亦相容張范危通夢求羊永絶蹤誰知長卿疾歌賦不還卭送王相公赴幽州一作韓翃詩黃閣開帷幄丹墀拜冕旒位髙湯左相權總漢諸侯不改周南化仍分趙北憂雙旌過易水千騎入幽州塞草連天暮邊風動地秋無因陪遠道結束佩吳鈎東郊迎春曉見蒼龍駕東郊春卩迎綵雲天仗合玄象太階平佳氣山川秀和風政令行勾陳霜騎肅御道雨師清律向韶陽變人隨草木榮遙觀上林樹今日遇遷鶯華清宫驪岫接新豐岩嶤駕翠空鑿山開祕殿隱霧閉仙宫綘闕猶栖鳯雕梁尚帶虹溫泉曽浴日華館舊迎風肅穆瞻雲輦沉深閉綺櫳東郊倚望處瑞氣靄濛濛和鄭少尹祭中嶽寺北訪蕭居士越上方肅事祠靈境尋真到隱居寅緣幽谷逺蕭散白雲餘晚節持僧律他年著道書海邊曽狎鳥濠上正觀魚寂靜求無相淳和覩太𥘉一峰綿歲月萬姓任盈虗籬隔溪中度空臨澗水踈謝公懷舊壑回駕復何如適荆州途次南陽贈何明府千里獨逰日有懷誰與同言過細陽令一遇朗陵公清節邁多士斯文傳古風閭閻知俗變原野識年豐吾道方在此前程殊未窮江天經峴北客思滿巴東夢渚夕愁逺山丘晴望通應嗟出處異流蕩楚雲中
