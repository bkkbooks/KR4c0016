front:
  text: 唐皇甫冉詩集卷之三
  hash: sha256:dfef1f82e47bea1679f76438e49234c302891efbf8c2a504b68c844e3e719391
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0016_SBCK_003-1a}
body:
  text: 唐􅀘闕􅃳州皇甫冉茂政著五言律詩􅃳州南郭留别縈迴楓葉岸留滯木蘭橈呉岫新經雨江天正落潮故人勞見愛行客自無􅂓君問前程事孤雲入剡遥􅀕張公洞二首堯心知稼檣精意遶山川風雨神斯應笙鏞詔命傳沐蘭柢掃地酌桂佇靈仙拂霧陳金䇿焚香拜玉筵雲開小有洞日出大羅天三鳥随王母􅀟童翊子先何時種桃核㡬度看桑田倐忽煙霞散空巖􅀐吏旋巫山峽巫峽見巴東迢迢出半空雲藏神女舘雨到楚王宫朝暮泉聲落寒暄􅀣色同清猿不可聽偏在九秋中長安路一作韓栩詩長安九城路戚里五侯家結束趨平楽聮翩抵狹斜高楼臨逺水􅃨道出繁花唯見相如宅蓬門度歳華送朱逸人時人多不見出入五湖間􅀉酒全吾道移家愛逺山便看秋草暮欲共白雲還雖在風塵裏陶潜身自閑西陵􅀉靈一上人朱放又見曽集題作西陸􅀉二公尾句字不同西陵遇風䖏自古是通津終日空江上雲山若待人汀洲寒事早魚鳥興情新􅂞望山隂路心中有所親赴無􅃬􅀉别靈一凈虚二上人雲門所居又見卽集題少数字高僧本姓竺開士一作寺舊名林一入春山裏千􅈐不可尋新年芳草遍終日白雲深欲狥㣲官去懸知訝此心獨孤中丞筵陪餞韋使君赴昇州中司龍節貴上客虎符新地控呉􅁭帶才光漢縉紳泛舟應度臘入境便行春䖏䖏歌來暮長江建業人送王緒剡中不見開山去何時到剡中已聞成竹木更道長兒童籬落雲常聚村墟水自通朝朝憶玄度非是對清風酬李郎中侍御秋夜登福州城楼見􅀉辛勤萬里道蕭索九秋殘月照閩中夜天疑海上寒王程無地遠主意在人安遥􅀉登楼作空知行路難同李司直諸公暑夜南餘館何處多明月津亭暑夜深煙霞不可望雲􅀣更沉沉好是呉中隠仍爲洛下吟官㣲朝復夕牽強亦何心贈普門上人支公身欲老長在沃州多惠力堪傳教禪功乆伏魔山雲隨坐夏江草伴頭陀借問􅂞心後賢愚去㡬何與諸公同登無錫北樓又見郎集秋興因危堞歸心過逺山風霜征鴈早江海旅人閑驛􅀣寒仍密漁舟晚自還仲宣何所賦祗歎在荆蠻未三字一作滯柴関同李􅂫州傷羙人玉珮石榴裙當年嫁使君專房猶見寵傾國衆皆聞歌舞嘗無對幽明忽此分陽臺千萬里何䖏作朝雲題魏仲光淮山所居人群不相見乃在白雲間問我將何適羡君今獨閑朝朝汲淮水暮暮上龜山幸巳安貧定惟從鬂髪斑送鄭判官赴徐州從軍非隴頭師在古徐州氣勁三河卒功多萬里侯元戎閫外令才子幄中籌莫聴􅀜山曲還生出塞愁送頋萇徃新安由來山水客復道向新安半是乗潮便全非行路難晨装林月在野飯浦沙寒嚴子千年後何人釣舊灘送􅁠三兄弟淮海風濤起江􅀜幽思長同悲鵲遶􅀣獨作鴈随陽山晚雲和雪汀寒月照霜由來濯纓䖏漁父愛滄浪落第後東逰留别學成方自得何事學干求果以浮名誤深貽逹士羞九江連漲海萬里任虚舟歳晚同懐客相思波上鷗􅀉劉八山中東皐􅀂近遠苦雨隔還期閠􅀊風霜晚山田􅀵穫遲茅詹燕去後樵路菊黄時平子逰都乆知君坐見􅅓九日􅀉鄭豊重陽秋已晚千里信仍稀何䖏登高望知君正憶歸還當採時菊定未授寒衣欲識離君恨郊園正掩扉劉方平西齋對雪對酒閑齋晚開軒臘雪時花輕疑絮絡色净潤簾帷委􅀣寒枝弱縈空去鴈遲自然堪訪戴無復四愁詩福先寺尋湛然寺主不見寂然空佇立徃徃報踈鍾髙舘誰留客東南二室峯川原通霽色野邑變春容惆悵層城暮猶言歸路逢秋夜􅀉所思寂寞坐遥夜清風何䖏來天髙散􅀐省月冷建章臺鄰笛哀聲急城砧朔氣催芙蓉已委絶誰復可爲媒賦得郢路悲猿悲猿何䖏發郢路第三聲逺客知秋暮空山益夜清啾啾深衆木噭噭入孤城坐覺盈心耳翛然適楚情清明日青龍寺上方賦得多字上方偏可適季月况堪過逺近水聲至東西山色多夕陽留徑草新葉變庭柯已度清明節春秋如客何與張諲宿劉八城東荘人閑當歳暮田野尚逢迎萊子多嘉慶陶公得此生寒蕪連古渡雲􅀣近嚴城鷄􅁰無辭薄貧交但貴情問上人疾醫王猶有疾妙理競難窮餌藥應隨病􅀚身轉悟空地閑花欲雨窻冷竹生風㡬日東林去門人待遠公送竇叔向入京氷結楊柳津從吾去入秦徒云還上國誰爲作中人驛􅀣同霜霰漁舟伴苦辛相如求一謁詞賦逺随身登石城戍望海􅀉諸暨嚴少府平明登古戍徙􅀝待寒潮江海方回合雲林自寂寥詎能知逺近徒見蕩煙霄卽此滄洲路嗟君乆折腰同樊潤州秋日登城樓露冕臨平楚寒城帶早霜時同借河内人是臥淮陽積水澄天塹連山入帝卿因高欲見下非是愛秋光送蔣評事徃福州江上春常早閩中客去稀登山怨迢遞臨水惜芳菲煙􅀣何時盡風㠶㡬日歸還看復命䖏盛府有光輝賦得荆溪夜湍送蔣逸人歸義興山驚湍流不極夜度識雲岑長帶溪沙淺時因山雨深方同七里路更遂五湖心掲厲朝將夕潺湲古至今花源君若許雖逺亦相尋送孔黨赴舉入貢列諸生詩書業早成家承孔聖後身有魯儒名楚水通縈浦秦山擁漢京愛君方弱冠爲賦少年行齊􅀰中筵賦得的的㠶向浦留别一㠶何䖏去正在望中微浦逈揺空色汀迴見落暉無争高鳥度能送逺人歸偏似南浮客悠􅀭無所依送陸鴻漸栖霞寺採茶採茶非採菉逺逺上層崖布葉春風暖盈筐白日斜舊知山寺路時宿野人家借問王孫草何時泛椀花迫丹陽與諸人同舟至馬林溪遇雨雲林不可望溪水更悠悠共載人皆客離家春到秋逺山方對枕細雨莫迴舟来徃南徐路多爲芳草留送李使君赴撫州逺送臨川守還同康藥侯歳時徒改易今古接風流五馬嘶長道􅀟旌向本州郷心􅀉西北應此郡城樓同樊潤州逰東山北固多陳迹東山復盛逰鐃聲發大道草色引行騶此地何時有長江自古流頻随公府歩南客􅀉徐州送安律師出家童子歳愛此雪山人長路經千里孤雲伴一身水中應見月草上豈傷春永日空林下心將何物親温湯即事天仗星辰轉霜冬景氣和􅀣含温液潤山入繚垣多丞相金錢賜平陽玉輦過魯儒求一謁無路獨如何送薛秀才雖是尋山客還同慢世人讀書惟務静無􅄄不憂貧野色春冬􅀣鷄聲逺近鄰郄公卽吾友合與爾相親酬李司兵直夜見􅀉江城聞皷角旅宿復何如寒月此宵半春風舊歳餘徒云資薄禄未必勝閑居見欲扁舟去誰能畏簡書送唐别駕赴郢州莫歎辭家逺方看佐郡榮長林通楚塞高嶺見秦城雪向嶢􅀜下人從郢路迎翩翩駿馬去自是少年行送李使君赴邵州出送東方􅀐行安南楚人城池春足雨風俗夜迎神郢路逢歸客湘川問去津争看使君度皂盖雪中新故齊王贈承天皇帝挽歌禮盛追宗日人知友悌恩舊居從代邸新隴入文園鴻寳仙書祕龍旂帝服尊蒼蒼松裏月萬古此高原贈恭順皇后晚歌但謝年方乆哀榮事獨稀雖殊百兩迓同是九泉歸詔使歸金䇿神人送玉衣空山竟不從寕肯學湘妃􅀉鄭二侍御歸新鄭無礙寺所居何事休官早歸來作鄭人雲山隨伴侶伏臘見郷親南畆無三徑東林􅀉一身誰當便静者莫使甑生塵送盧山人歸林慮山無論行遠近歸向舊煙林寥落人家少靑􅄀鳥道深白雲長滿目芳草自知心山色連東海相思何處尋送榮别駕赴華州直到群峯下應無累日程髙車入郡舎流水出􅀜城草色田家逈槐隂府吏迎還將海沂詠缺五字送常大夫加散􅀐常侍赴朔方故壘煙霞後新軍河塞間金貂寵漢將玉節度蕭􅀜澶漫沙中雪依稀漢口山人知竇車􅀐計日勒銘還送柳八貟外赴江西岐路窮無極長江九􅉽分行人随旅鴈楚􅀣入湘雲乆在征南役何殊薊北勳離心不可問􅀊暮雪紛紛又送陸潜夫尋友一作皇甫冉詩登山自􅀘􅄚訪友不齎糧坐嘯青楓晚行吟白日長人煙隔水見草氣入林香誰作招尋侣清齋宿紫陽送盧􅀰中使君赴京三年期上國萬里自東溟曲盖遵長道油幢憇短亭楚雲山隠隠淮雨草青青康樂多新興題詩紀所經送鄭員外八茅山居但見全家去寧知㡬日還白雲迎谷口流水出人間冠冕情遺世神仙事滿山其中應有物豈貴一身閑送志彌師徃淮南巳能持律藏復去禮禪亭長老偏摩頂時流尚誦經獨行寒野曠旅宿逺山青眷属空相望鴻飛已杳􅄀謝􅅊大夫柳栽本在胡茄曲今從漢將營濃因方待庇弱植豈無情比雪花應吐藏烏葉未成五株蒙遠賜應使號先生􅀉劉方平大谷田家故山聞獨徃樵路憶相從氷結泉聲絶霜清野翠濃籬􅁁潁陽道竹外少姨􅈐日夕田家務寒煙隔幾重雨雪風沙悲久戌雨雪更勞師絶漠無人境將軍苦戰時山川迷向背氛霧失旌旗徒念天涯隔中人芳草期送劉兵曹還隴山居離堂徒讌語行子但悲辛雖是還家客終爲隴上人先秋雪巳滿近夏草􅀄新唯有聞羗笛梅花曲裏春同裴少府安居寺對雨共結尋真㑹還當退食􅀄鑪煙雲氣合林葉雨聲餘溽暑銷珍簟浮涼入綺䟽歸心從念遠懐此復何如送元晟歸潜山所居深山秋事早歸去復何如裛露􅀵新稼迎寒葺舊廬題詩卽招隠作賦是閑居别後空相憶嵇康􅂴􅀉書送康判官往新安賦得江路曲南永不向新安去那知江路長猿聲近廬霍水色勝瀟湘驛􅀣􅀵殘雨漁家帶夕陽何須愁旅泊使者有輝光宣洞靈觀孤煙靈洞遠積雪滿山寒松栢凌髙殿莓苔封石壇客来清夜乆仙去白雲殘明日開金籙焚香更沐蘭酬盧十一過宿乞還方未遂日夕望雲林况復逢春草何勞問此心閑門公務散枉䇿故情深遥夜他郷酒同居梁甫吟奉和對雪春雪偏當夜暄風􅁍變寒庭深不復掃城曉更宜看命酒閑今酌披裘晚未冠連營鼓角動忽似戰桑乾送蕭献惆悵煙郊晚依然此送君長河隔旅夢浮客伴孤雲淇上春山直􅀺陽大道分西陵儻一弔應有士衡文賣藥人䖏得南陽朱山人書賣藥何爲者逃名市井居唯通逺山信因致逸人書㔾報還丹効全將世事踈秋風溪景裏蕭散􅀉樵漁送裴員外往江南公務江南遠留􅂬幙下榮楓林緑楚澤水驛到湓城岸草知春晚沙禽好夜驚風㠶幾泊䖏䖏䖏暮潮清奉和王相公早春登徐州城落日憑危堞春風似故郷川流通楚塞山色遶徐方壁壘依寒草旌旗動夕陽無戎資上䇿南畆起耕桑奉和對山僧又見曽集吏散重門掩僧來閉閤閑逺心馳北闕春興􅀉東山草長風光裏鸎喧静黙間芳辰不可住惆悵暮禽還奉和待勤照上人不至東洛居賢相南方待本師旌麾儼欲動杯􅃬杳仍遲積雪迷何䖏驚風泊㡬時大臣能護法况有故山期奉和漢祖廟下之作古廟風煙積春城車􅀐過方修漢祖寺更使沛童歌寝帳巢禽出香煙水霧和神心降福䖏應在故郷多和朝郎中楊子翫雪滿􅀉山隂嚴維凝隂晦長箔積雪滿通川征客寒猶去愁人晝更眠謝家興詠日漢將出師年聞有招尋興隨君訪戴􅂳歸渡洛水暝色赴春愁歸人南渡頭渚煙空翠合灘月碎光流澧浦饒芳草滄浪有釣舟誰知訪歌客此意正悠悠送田濟􅀭州赴選家貧不自給求禄爲荒年調􅀘無髙位卑棲屈此賢江山欲霜雪呉楚接風煙相去誠非遠離心亦􅄅然酬崔侍御期籍道士不至兼􅀉一心求妙道㡬􅀊候真師丹竈今何在白雲無定期崑崙景致絶汗漫往還遲君但焚香待人間到有時送韋山人歸鍾山所居又見􅀰集逸人歸路遠弟子出山迎服藥顔雖駐耽書癖未成柴扉度歳月藜杖見公卿更作儒林傳還應有姓名徐州送丘侍御之越時鳥催春色離人惜歳華遠山隨擁傳芳草引還家北固潮當濶西陵路稍斜縱令寒食過猶有鏡中花送延陵陳法師赴上元延陵􅀄罷講建業去隨縁翻譯推多學壇􅂣最少年浣衣逢野水乞食向人煙遍禮南朝寺焚香古像前賦得海邊􅀣歷歷縁荒岸㝠㝠入遠天每同沙草發長共水雲聮揺落潮風早離披海雨偏故傷逰子意多在客舟前題昭上人房沃州傳教後百衲老空林慮盡朝昏磬禪隨坐卧心鶴飛湖草逈門閉野雲深地與天台接中峯早晚尋婕妤怨由來詠團扇今已值秋風事逐時皆往恩無日􅂯中早鴻聞上苑寒露下深宮顔色年年謝相如賦豈工送客旗鼓軍威重􅀜山客路賖待封甘度隴􅂞首不思家城下春山路營中瀚海沙河源雖萬里音信􅀉東查秋夜宿嚴維宅昔聞玄度宅問向㑹稽峰君住東湖下清風􅁇舊跡秋深臨水月夜半隔山鍾世故多離别良宵詎可逢送普門上人又見曽集花宫難乆别道者憶千燈殘雪入林路深山歸寺僧日光依嫩草泉響滴春氷何用求方便看心是一乗送䕫州班使君晚日照樓前三軍拜峽前白雲随浪散青壁與城連萬嶺岷峨雪千家橘柚川還如赴河内天子去經年酬袁􅀘闕中天寺見􅀉東林􅀄結社已有晚鐘聲窻户背流水房廊半架城逺山重疊見芳草淺深生每與君携手多煩長老迎和謝􅃕人雪後寓直禁省夜沉沉春風雪滿林滄洲歸客夢青瑣侍臣心揮翰宣鳴玉承恩在賜金建章寒漏起更助掖垣深重西陵􅀉靈一上人朱放西津遇風䖏自古是通津終日空江上雲山􅀂待人汀洲寒事早魚鳥興情新􅅆南望山隂路吾心有所親歸陽羡兼送劉八長卿湖上孤㠶别江南謫䆠歸前程愁更遠臨水淚沾衣雲夢春山徧瀟湘過客稀武陵招我隠歳晚閉柴扉尋戴處士車馬長安道誰知大隠心蠻僧留古鏡蜀客􅀉新琴晒藥竹齋暖搗茶松院深思君一相訪殘雪似山隂早發中嚴寺别契上人蒼蒼松桂隂殘月半西岑素璧寒燈暗紅爐夜火深􅌮開山䑕散鍾盡嶺猿吟行役方如此逢師􅂴話心酬鄭髙郵秋夜見􅀉揺落空林夜河陽興已生欲辭公府歩知結逺山情髙柳風難定寒泉月助明袁安方卧雪尺素及柴荆
