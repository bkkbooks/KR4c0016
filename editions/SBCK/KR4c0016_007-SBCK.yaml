front:
  text: 唐皇甫冉詩集卷之七
  hash: sha256:3dbf94824d697b7e2e203a0b952cd3e8c7f013ca05ccb1e8014dc71b930618c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0016_SBCK_007-1a}
body:
  text: 唐􅀘闕潤州皇甫冉茂政著七言絶句臨平道中贈同舟人遠山誰辯江南北長路空随􅀣淺深流蕩飄颻此何極唯因行客共知心舟中送李八得􅅆字詞客金門未有媒逰呉適越任舟􅂞逺水迢迢分首去天􅁁山色待人来少室􅅊鍊師昇仙歌紅霞紫氣晝氲氲絳節青幢迎少君忽從林下昇天去空使時人禮白雲送裴闡得歸字道向毗陵豈是歸客中誰與換春衣今夜孤舟行近遠子荆零雨正霖霏秋夜戯題劉方平壁鴻悲月白時將謝正可招尋惜遥夜翠帳蘭房曲且深寕知户外清霜下重陽日酧李􅀚不見白衣来送酒但令黄菊自開花愁看日晚良辰過歩歩行尋陶令家􅀉􅁠器露濕青蕪時欲晚水流黄葉意無窮節近重陽念歸否眼前籬菊帶秋風送陸澧郭鄖􅅻見呉洲百草春已聞燕鴈一聲新秋風何䖏催年急偏逐山行水宿人􅀉振上人無碍寺所居恋親時見在人群多在東南就白雲獨坐焚香誦經䖏深山古寺雪紛紛酧張継并序懿孫余之舊好祗役武昌六言詩見懐今以七言裁荅盖拙扵事者繁而費也悵望南徐登北固迢遥西塞限東関落日臨川問音信寒潮惟帶夕陽還又得雲字何事千年遇聖君坐令􅀟鬂老如雲南行更入深山淺岐路悠悠水自分題蔣道士房軒窓縹緲起煙霞誦訣存思白日斜聞道崑崙有仙籍何時青鳥送丹砂送雲陽少府得歸字渭田春光無逺近池陽谷口倍芳菲官􅃕村橋来㡬日殘花寥落待君歸曽山送別凄凄逰子若飄蓬明月清罇秪暫同南望千山如黛色愁君客路在其中赴李少府莊失路君家南郭白雲連正待情人弄石泉月照煙花迷客路蒼蒼何䖏是伊川送謝十二判官四牡驅馳千里餘越山稠疊海林踈不辭終日離家逺應爲劉公一􅁓書同李萬晚望南岳寺懐普門上人釋子身心無垢紛獨將衣鉢去人群相思晚望松林寺唯有鐘聲出白雲送魏十六還蘇州秋夜沉沉北一作此送君隂蟲切切不堪聞歸一作孤舟明月一作日毗陵道迴首姑蘇是白雲浪淘沙二首蠻歌荳􅛌北人愁松雨蒲風野艇秋浪起鵁鶄眠不得寒沙細細入江流灘頭細草接踈林惡浪䆵􅂳半欲沉􅀫鷺眠洲非舊浦去年沙觜是江心夜發沅江􅀉李潁州劉侍􅀰時二公貶扵此半夜回舟入楚郷月明山水共蒼蒼孤猿更發秋風裏不是愁人亦㫁腸
