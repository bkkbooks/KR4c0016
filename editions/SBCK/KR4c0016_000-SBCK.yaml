body:
  text: 十歳能属文張九齡嘆而異之天寳間與弟俱登弟授無􅃬尉避難居陽羡大暦中爲王縉掌書記後爲左金吾衞兵曹叅軍終左􅀘􅆣卒有集三卷傳于世唐皇甫冉詩集目録四言古詩劉方平壁􅀞山五言古詩與張􅀘闕王錬師自徐方清路同舟中下於臺頭寺留别趙員外裴􅀘闕同賦雜題一首屏風上各賦一物得携琴客􅀉劉方平曾東遊以詩􅀉之崔十四宅各賦一物得簷柳送叚明府酬楊侍御寺中見招見諸􅁎學玉臺體題裴二十一新園􅀉髙雲送張南史送薛判官之越賦得簷燕送魏中丞還河北又賦得越山三韻送竇向叔題髙雲客舎之京留别劉方平出塞酬裴十四送鄭二員外七言古詩雜言湖山歌送許鳴謙并序雜言迎神詞二首并序迎神送神江草歌送盧判官雜言月洲歌送趙冽還衰陽澧水送鄭豊鄠縣讀書登山歌雜言無􅃬惠山寺流泉歌送包佶賦得天津橋盧山歌送至弘法師兼呈薛江州送陸潜夫徃茅山賦得華陽洞雜騷體酬􅁠器五言律詩潤州南郭留别􅀕張公洞二首巫山峽長安路送朱逸人西陵􅀉靈一上人朱放赴無􅃬􅀉别靈一净虗二上人雲門所居獨孤中丞筵陪餞􅅊使君赴昇州送王緒剡中酬李郎中侍御秋夜登福州城楼見􅀉同李司直諸公暑夜南餘館贈普門上人與諸公同登無􅃬北楼同李蘇州傷羙人題魏仲光淮山所居送鄭判官赴徐州送頋萇徃新安送􅁠三兄弟落第後東逰留别􅀉劉八山中九日􅀉鄭豊劉方平西齋對雪福先寺尋湛然寺主不見秋夜􅀉所思賦得郢路悲猿清明日青龍寺上方賦得多字與張諲宿劉八城東莊問上人疾送竇叔向入京登石城戌望海􅀉諸曁嚴少府同樊􅃳州秋日登城楼送蔣評事徃福州賦得荆溪夜湍送蔣逸人歸義興山送孔黨赴舉齊郎中筵賦得的的㠶向浦留别送陸鴻漸栖霞寺採茶迫舟陽與諸人同舟至馬林溪遇雨送李使君赴撫州同樊潤州逰東山送安律師温湯即事送薛秀才酬李司兵直夜見􅀉送唐别駕赴郢州送李使君赴邵州故齊王贈承天皇帝挽歌贈恭順皇后晚歌􅀉鄭二侍御歸新鄭無礙寺所居送盧山人歸林慮山送榮别駕赴華州送常大夫加散􅀐常侍赴朔方送柳八員外赴江西又送陸潜夫尋友送盧郎中使君赴京送鄭員外入茅山居送志彌師徃淮南謝􅅊大夫柳栽􅀉劉方平大谷田家雨雪送劉兵曹還隴山居同裴少府安居寺對雨送元晟歸潜山所居送康判官徃新安賦得江路曲南永宣洞靈􅀚酬盧十一過宿奉和對雪送蕭献賣樂人䖏得南陽朱山人書送裴員外徃江南奉和王相公早春登徐州城奉和對山僧奉和待勤照上人不至奉和漢祖廟下之作和朝郎中楊子翫雪滿􅀉山隂嚴維歸渡洛水送田濟􅀭州赴選酬崔侍御期籍道士不至兼􅀉送􅅊山人歸鍾山所居徐州送丘侍御之越送延陵陳法師赴上元賦得海邊􅀣題昭上人房捷妤怨送客秋夜宿嚴維宅送普門上人送䕫州班使君酬􅀽􅀘闕中天寺見􅀉和謝舎人雪後寓直西陵􅀉靈一上人朱放歸陽羡兼送劉八長卿尋戴䖏士早發中嚴寺别契上人酬鄭髙郵秋夜見􅀉五言排律酬張二仲彛荅張諲劉方平兼呈賀蘭廣酬包評事壁􅀞山水見􅀉贈鄭山人河南鄭少尹城南亭送鄭判官還河東登玄元廟冬夜集賦得寒漏􅀉江東李判官送從弟豫貶逺州太常魏慱士逺出賊庭江外相逢因叙其事上禮部楊侍郞宿嚴維宅送包七送李萬州赴饒州􅀚省送鄒判官赴河南送歸中丞使新羅劉侍御朝命許停官歸侍夜集張謹所居奉賀獨孤中丞逰法華寺閑居作送䖏州裴使君赴京和􅀽􅀰中破賊後經剡中山水送魏六侍御塟送王相公赴幽州東郊迎春華清宫和鄭少尹􅀕中岳寺北訪蕭居士越上方適荆州途次南陽贈何明府七言律詩三月三日義興李明府後亭泛舟送李録事赴饒州秋夜有懐高十五兼呈空和尚玄元􅀚送李深李風還奉先華隂送錢塘路少府赴制舉酬張二倉曹楊子所居見􅀉兼呈韓郎中使徃壽州淮路􅀉劉長卿同温丹徒登萬歳楼宿淮隂南楼酬常伯能酬李􅀘闕送崔使君赴壽州館陶李丞舊居送􅀽􅀰中破賊北歸􅀉􅅊司直彭祖井秋日東郊作送張道士歸茅山謁李尊師送孔巢父赴河南軍招隠寺送聞判官還江州李二侍御丹陽東去新亭五言絶句同諸公有懐絶句題􅀞帳二首山水逺㠶渡汝水向太和山秋怨山中五詠門柳逺山南澗春草山館同張侍御詠興寕寺經藏院海石榴送王司直婕好怨酬李判官度梨嶺見􅀉題盧十所居山半橫雲病中對石竹花送王翁信還剡中舊居送陸䆳潜夫并序楊氏林亭探得古槎和王給事禁省棃花詠送陸鴻漸赴越序臺頭寺願上人院古松下有小松栽毫末新生與纎草不辨重其有凌雲干霄之志與趙員外裴十􅀘闕同賦之漁子溝􅀉趙員外裴􅀘闕同李三月夜作􅀄入沆江夜入湖送裴陟歸常州洪澤舘壁見禮部尚書題詩望南山雪惟山寺普上人贈􅀉􅁠三客舎送李山人還六言小江靈一上人奉􅀉皇甫􅀘闕送鄭二之茅山問李二司直所居雲山閑居七言絶句臨平道中贈同舟人舟中送李八少室􅅊錬師昇仙歌送裴闡秋夜戯題劉方平壁重陽日酬李􅀚􅀉􅁠器送陸澧郭鄖􅀉振上人無礙寺所居酬張􅁇并序又得雲字題蔣道士房送雲陽少府曽山送别赴李少府莊失路送謝十二判官同李萬晚望南岳寺懐普門上人送魏十六還蘇州皇甫曾字孝常潤州人天寳中與兄冉俱登進士第歷官侍御史坐貶舒州司馬陽翟令當時兄弟齊名人比之張景陽孟陽云有集一卷行于世髙仲武云昔孟陽之與景陽論徳逺慙厥弟恊居上品載䖏下流今侍御之與􅀘闕文辭亦爾體制清潔華彩有文然寒生五湖道春及萬年枝五言之選也其爲士林所尚宜哉唐皇甫曽詩集目録五言古詩贈霈禪五言律詩奉陪韋中丞使君遊鶴林寺奉送杜侍御還酬鄭侍御秋夜見􅀉送普上人還陽羡送李中丞歸本道和謝􅃕人雪夜寓直傷陸䖏士烏程水樓留别西陵􅀉二公題贈呉門邕上人送著公歸越送陸鴻漸山人採茶􅅆􅀉劉員外長卿􅀉張衆甫送元侍御􅂶使湖南晚至華隂送孔徴士秋興送歸中丞使新羅送少㣲上人東南逰送韋判官赴閩中送人徃荆州􅀉浄虗上人􅀄至雲門尋劉䖏士五言排律春和杜相公移入長興宅奉呈諸宰執贈鍳上人送湯中丞和蕃送和西蕃使送王相公赴幽州送徐大夫赴南海七言律詩早朝言􅀉􅀁知秋夕􅀉懐契上人張芬見訪郊居作奉􅀉中書王􅃕人五言絶句洛中口號山下泉七言絶句酧竇拾遺秋日見呈韋使君宅海榴詩㟧嶺四望皇甫冉詩補遺目錄逢莊納因贈五律一首送鄭秀才貢舉五律一首題竹扇贈別五律一首怨回紇歌五律二首春思七律一首韋中丞西廳海榴七絕一首
