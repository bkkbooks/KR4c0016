body:
  text: 唐皇甫冉詩集卷之二唐􅀘闕潤州皇甫冉茂政著七言古詩雜言湖山歌送許鳴謙并序夫子隠者也耕扵湖山之田孤雲無心飛鳥無跡伯仲邕友家人怡怡真白之風旁行於澆俗矣始惠然而去又翻然而歸春田雪餘具物繁殖結我幽夢湖間一峯酒而歌歌之以送逺湖中之山分波上青桂䬃䬃分雨􅁳􅁳君歸兮春早滿山兮碧草晨春暮汲兮心何求澗户巖扉兮身自老東嶺西峯兮同白雲鷄鳴犬吠兮時相聞幽芳媚景兮當嘉月踐石捫蘿兮恣超忽空山寂寂兮頴陽人旦夕孤雲随一身雜言迎神詞二首并序呉楚之俗與巴渝同風日見歌無祀者問其故荅曰及夏不雨慮將無年復云家有行人不歸憑是景夫福此二者皆我所懐􅀉地種苗將成枯草弟爲臺官覉旅京師秉筆爲迎神送神詞以應其聲亦􅀉􅀁懐也迎神啓庭户列芳鮮目􅆌􅆌心綿綿因風託雨䧏瓊筵紛下拜屢加籩人心望􅀊祈豊年送神露沾衣月隠璧氣凄凄人寂寂風迴雨度虚瑶席来無聲去無跡神心降和神逺客江草歌送盧判官江皐兮春早江上兮芳草雜蘼蕪兮杜蘅作叢秀兮復羅生􅀍遥隰兮經長坂雨中深兮煙中淺目􅆌􅆌兮増愁歩遲遅兮堪搴澧之浦兮湘之濵思夫君兮送羙人呉洲曲兮楚郷路逺孤城兮依獨戌新月能分裛露時夕陽照見連天䖏問君行邁終何之淹泊㳂洄風日遲䖏䖏汀洲有芳草王孫詎肯念歸期雜言月洲歌送趙冽還㐮陽漢之廣矣中有洲洲如月兮水環流䀨䀨兮湍與瀬草靑兮春更秋苦竹林香楓􅀣樵子罛師㡬家住萬山飛雨一川来巴客歸􅂳傍洲去歸人不可遲芳杜滿洲時無限風煙皆自悲莫辭貧賤隔心期家住洲頭定近逺朝泛輕橈暮當返不能随尔卧芳洲自念天機一何淺澧水送鄭豊鄠縣讀書麥秋中夏涼風起送君西郊及澧水孤煙逺􅀣動離心隔岸江流􅀂千里早年江海謝浮名此路雲山惬尔情上古全經皆在口秦人如見濟南生登山歌青山前青山後登髙望兩䖏兩䖏今何有煙景滿川原離人堪白首雜言無􅃬惠山寺流泉歌寺有泉兮泉在山鏘金鳴玉兮長潺潺作潭鏡兮澄寺内泛巖花兮到人間􅁟膏脉動知春早隈隩隂深長苔草處處萦􅂞石磴喧朝朝􅏕潄山僧老僧自老松自新流活活無冬春任䟽鑿兮任汲引􅀂有意兮山中人偏依佛界通仙境明㓕玲瓏媚林嶺宛如太室臨九潭詎减天台望三井我來結綬未經秋已厭㣲官憶舊逰且復遲􅂞猶未去此心秪爲靈泉留送包佶賦得天津橋洛陽􅀊暮作征客相望依然一水間相思已如千里隔晴煙霽景滿天心鳯閣龍楼映水濵豈無朝夕軒車度其柰相逄非所親鞏􅀣甘陵愁逺道他郷一望人堪老君報還期在早春橋􅁁日日看芳草廬山歌送至弘法師兼呈薛江州釋子去兮訪名山禪舟容與兮住仍前猿啾啾兮怨月江􅄅􅄅兮多煙東林西林兮入何處上方下方兮通石路連湘接楚饒桂花事乆年深無杏􅀣使君愛人兼愛山時引双旌萬木間政成人野皆不擾遂令法侣性安閑送陸潜夫徃茅山賦得華陽洞離騷體㳺仙洞兮訪真官奠瑶席兮禮石壇忽髣髴兮雲擾杳隂深兮夏寒欲迥頭兮揮手便辭家兮可否有婚姻兮嬰􅅶綿歸来兮已乆酬􅁠器南望江南滿山雪此情惆悵將誰說徒随群吏不曽閑頋與諸生爲乆别聞君静坐轉耽書種􅀣葺茅還舊居終日白雲應自足明年芳草又何如人生有懐􅀂不展出入公門猶未免迴舟朝夕待春風先報華陽洞深淺
