body:
  text: 十歲能屬文張九齡嘆而異之天寶間與弟俱登弟授無錫尉避難居陽羡大曆中為王縉掌書記後為左金吾衛兵曹參軍終左𥙷闕卒有集三卷傳于世唐皇甫冉詩集目録四言古詩劉方平壁畫山五言古詩與張𥙷闕王錬師自徐方清路同舟中下於臺頭寺留别趙員外裴𥙷闕同賦雜題一首屏風上各賦一物得携琴客寄劉方平曾東遊以詩寄之崔十四宅各賦一物得簷柳送假明府酬楊侍御寺中見招見諸姬學玉臺體題裴二十一新園寄髙雲送張南史送薛判官之越賦得簷燕送魏中丞還河北又賦得越山三韻送竇向叔題髙雲客舍之京留别劉方平出塞酬裴十四送鄭二員外七言古詩雜言湖山歌送許鳴謙并序雜言迎神詞二首并序迎神送神江草歌送盧判官雜言月洲歌送趙冽還衰陽澧水送鄭豐鄠縣讀書登山歌雜言無錫惠山寺流泉歌送包佶賦得天津橋盧山歌送至弘法師兼呈薛江州送陸潜夫往茅山賦得華陽洞雜騷體酬權器五言律詩潤州南郭留别祭張公洞二首巫山峽長安路送朱逸人西陵寄靈一上人朱放赴無錫寄别靈一净虗二上人雲門所居獨孤中丞筵陪餞韋使君赴升州送王緒剡中酬李郎中侍御秋夜登福州城樓見寄同李司直諸公暑夜南餘館贈普門上人與諸公同登無錫北樓同李蘇州傷美人題魏仲光淮山所居送鄭判官赴徐州送顧萇往新安送權三兄弟落第後東逰留别寄劉八山中九日寄鄭豐劉方平西齊對雪福先寺尋湛然寺主不見秋夜寄所思賦得郢路悲猿清明日青龍寺上方賦得多字與張諲宿劉八城東莊問上人疾送竇叔向入京登石城戌望海寄諸暨嚴少府同樊潤州秋日登城樓送蔣評事往福州賦得荆溪夜湍送蔣逸人歸義興山送孔黨赴舉齊郎中筵賦得的的帆向浦留别送陸鴻漸栖霞寺採茶迫舟陽與諸人同舟至馬林溪遇雨送李使君赴撫州同樊潤州逰東山送安律師溫湯即事送薛秀才酬李司兵直夜見寄送唐别駕赴郢州送李使君赴邵州故齊王贈承天皇帝挽歌贈恭順皇后晚歌寄鄭二侍御歸新鄭無礙寺所居送盧山人歸林慮山送榮别駕赴華州送常大夫加散騎常侍赴朔方送柳八員外赴江西又送陸潜夫尋友送盧郎中使君赴京送鄭員外入茅山居送志彌師往淮南謝韋大夫柳栽寄劉方平大谷田家雨雪送劉兵曹還隴山居同裴少府安居寺對雨送元晟歸潜山所居送康判官往新安賦得江路曲南永宣洞靈觀酬盧十一過宿奉和對雪送蕭獻賣樂人處得南陽朱山人書送裴員外往江南奉和王相公早春登徐州城奉和對山僧奉和待勤照上人不至奉和漢祖廟下之作和朝郎中楊子玩雪滿寄山隂嚴維歸渡洛水送田濟揚州赴選酬崔侍御期籍道士不至兼寄送韋山人歸鍾山所居徐州送丘侍御之越送延陵陳法師赴上元賦得海邊樹題昭上人房捷妤怨送客秋夜宿嚴維宅送普門上人送䕫州班使君酬袁𥙷闕中天寺見寄和謝舍人雪後寓直西陵寄靈一上人朱放歸陽羡兼送劉八長卿尋戴處士早發中嚴寺别契上人酬鄭髙郵秋夜見寄五言排律酬張二仲彛答張諲劉方平兼呈賀蘭廣酬包評事壁畫山水見寄贈鄭山人河南鄭少尹城南亭送鄭判官還河東登玄元廟冬夜集賦得寒漏寄江東李判官送從弟豫貶逺州太常魏慱士逺出賊庭江外相逢因叙其事上禮部楊侍郎宿嚴維宅送包七送李萬州赴饒州觀省送鄒判官赴河南送歸中丞使新羅劉侍御朝命許停官歸侍夜集張謹所居奉賀獨孤中丞逰法華寺間居作送處州裴使君赴京和袁郎中破賊後經剡中山水送魏六侍御葬送王相公赴幽州東郊迎春華清宫和鄭少尹祭中嶽寺北訪蕭居士越上方適荆州途次南陽贈何明府七言律詩三月三日義興李明府後亭泛舟送李録事赴饒州秋夜有懷高十五兼呈空和尚玄元觀送李深李風還奉先華隂送錢塘路少府赴制舉酬張二倉曹楊子所居見寄兼呈韓郎中使往壽州淮路寄劉長卿同溫丹徒登萬歲樓宿淮隂南樓酬常伯能酬李𥙷闕送崔使君赴壽州館陶李丞舊居送袁郎中破賊北歸寄韋司直彭祖井秋日東郊作送張道士歸茅山謁李尊師送孔巢父赴河南軍招隱寺送聞判官還江州李二侍御丹陽東去新亭五言絶句同諸公有懷絶句題畫帳二首山水逺帆渡汝水向太和山秋怨山中五詠門柳逺山南澗春草山館同張侍御詠興寧寺經藏院海石榴送王司直婕好怨酬李判官度梨嶺見寄題盧十所居山半橫雲病中對石竹花送王翁信還剡中舊居送陸邃潜夫并序楊氏林亭探得古槎和王給事禁省梨花詠送陸鴻漸赴越序臺頭寺願上人院古松下有小松栽毫末新生與纎草不辨重其有凌雲干霄之志與趙員外裴十𥙷闕同賦之漁子溝寄趙員外裴𥙷闕同李三月夜作𥘉入沆江夜入湖送裴陟歸常州洪澤館壁見禮部尚書題詩望南山雪惟山寺普上人贈寄權三客舍送李山人還六言小江靈一上人奉寄皇甫𥙷闕送鄭二之茅山問李二司直所居雲山間居七言絶句臨平道中贈同舟人舟中送李八少室韋錬師升仙歌送裴闡秋夜戲題劉方平壁重陽日酬李觀寄權器送陸澧郭鄖寄振上人無礙寺所居酬張繼并序又得雲字題蔣道士房送雲陽少府曽山送别赴李少府莊失路送謝十二判官同李萬晚望南嶽寺懷普門上人送魏十六還蘇州皇甫曾字孝常潤州人天寶中與兄冉俱登進士第歷官侍御史坐貶舒州司馬陽翟令當時兄弟齊名人比之張景陽孟陽云有集一卷行于世髙仲武云昔孟陽之與景陽論德逺慙厥弟協居上品載處下流今侍御之與𥙷闕文辭亦爾體制清潔華彩有文然寒生五湖道春及萬年枝五言之選也其為士林所尚宜哉唐皇甫曽詩集目録五言古詩贈霈禪五言律詩奉陪韋中丞使君遊鶴林寺奉送杜侍御還酬鄭侍御秋夜見寄送普上人還陽羡送李中丞歸本道和謝舍人雪夜寓直傷陸處士烏程水樓留别西陵寄二公題贈吳門雍上人送著公歸越送陸鴻漸山人採茶回寄劉員外長卿寄張衆甫送元侍御充使湖南晚至華隂送孔徴士秋興送歸中丞使新羅送少微上人東南逰送韋判官赴閩中送人往荆州寄淨虗上人𥘉至雲門尋劉處士五言排律春和杜相公移入長興宅奉呈諸宰執贈鍳上人送湯中丞和蕃送和西蕃使送王相公赴幽州送徐大夫赴南海七言律詩早朝言寄所知秋夕寄懷契上人張芬見訪郊居作奉寄中書王舍人五言絶句洛中口號山下泉七言絶句酬竇拾遺秋日見呈韋使君宅海榴詩崿嶺四望皇甫冉詩補遺目録逢莊納因贈五律一首送鄭秀才貢舉五律一首題竹扇贈別五律一首怨回紇歌五律二首春思七律一首韋中丞西廳海榴七絶一首
