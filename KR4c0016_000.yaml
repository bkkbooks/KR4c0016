front:
  text: 左𥙷闕安定皇甫冉集序五言詩之源生於國風廣於離騷著於蘇李盛於曹劉其所自逺矣當漢魏間雖已朴散為器作者猶質有餘而文不足以今揆昔則有朱絃踈越大羔遺味之歎歷千餘歲至沈詹事宋員外始財成六吕彰施五色使言之而中倫歌之而成聲緣情綺靡之功至是乃備雖去雅寢逺其麗有過於古者亦猶路鼗出於土鼓篆籕生於鳥跡也沈宋既殁而崔司勳皓王右丞維復崛起於開元天寶之間得其門而入者當代不過數人𥙷闕其一也𥙷闕諱冉字茂政玄晏先生之後樂平縣令價之孫潭州長史顗之子十歲能屬文十五而老成右丞相曲江張公深所歎異伯父祕書少監彬尤器之自而令問休暢舉進士第一歷無錫尉左金吾兵曹今相國太原公之推轂河南也辟為書記大曆二載遷左拾遺轉左𥙷闕奉使江表因省家至丹陽朝廷虗三署郎位以待君之復不幸短命年方五十四而殁嗚呼惜哉君忠恕廉恪居官可紀孝友恭讓自內形外言必依仁交不苟合得喪喜愠罕見於容故覩君述作知君所尚以景命不永斯文未臻其極也蓋存於遺禮者凡三百有五十篇其詩大略以古之比興就今之聲律涵泳風騷憲章顔謝至若麗曲感動逸思奔發則天機獨得非師資所漿每舞雩詠歸或金谷文㑹曲水修褉南浦愴别新聲秀句輒加於常時一等才鍾於情故也君母弟曽字孝常與君同禀學詩之訓君有誨誘之助焉既而麗藻竸爽盛名相亞同乎聲者方之景陽孟陽孝常既除喪懼遺製之墜于地也以某與茂政前後為諌官故銜痛編集以論撰見託遂著其始終以冠于篇時大曆十四年月日司封郎中河南獨孤及序皇甫冉字茂政潤州人玄晏先生謐之後
