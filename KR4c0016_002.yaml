body:
  text: 唐皇甫冉詩集卷之二唐輔闕潤州皇甫冉茂政著七言古詩雜言湖山歌送許鳴謙并序夫子隱者也耕于湖山之田孤雲無心飛鳥無迹伯仲雍友家人怡怡真白之風旁行於澆俗矣始惠然而去又翻然而歸春田雪餘具物繁殖結我幽夢湖間一峯酒而歌歌之以送逺湖中之山分波上青桂颯颯分雨冥冥君歸兮春早滿山兮碧草晨春暮汲兮心何求澗户巖扉兮身自老東嶺西峯兮同白雲雞鳴犬吠兮時相聞幽芳媚景兮當嘉月踐石捫蘿兮恣超忽空山寂寂兮頴陽人旦夕孤雲隨一身雜言迎神詞二首并序吳楚之俗與巴渝同風日見歌無祀者問其故答曰及夏不雨慮將無年復云家有行人不歸憑是景夫福此二者皆我所懷寄地種苗將成枯草弟為臺官羇旅京師秉筆為迎神送神詞以應其聲亦寄所懷也迎神啓庭户列芳鮮目眇眇心綿綿因風託雨降瓊筵紛下拜屢加籩人心望歲祈豐年送神露沾衣月隱璧氣凄凄人寂寂風回雨度虛瑶席來無聲去無迹神心降和神逺客江草歌送盧判官江皋兮春早江上兮芳草雜蘼蕪兮杜蘅作叢秀兮復羅生𬒳遙隰兮經長坂雨中深兮煙中淺目眇眇兮增愁步遲遲兮堪搴澧之浦兮湘之濵思夫君兮送美人吳洲曲兮楚鄉路逺孤城兮依獨戌新月能分裛露時夕陽照見連天處問君行邁終何之淹泊沿洄風日遲處處汀洲有芳草王孫詎肯念歸期雜言月洲歌送趙冽還襄陽漢之廣矣中有洲洲如月兮水環流䀨䀨兮湍與瀨草靑兮春更秋苦竹林香楓樹樵子罛師幾家住萬山飛雨一川來巴客歸船傍洲去歸人不可遲芳杜滿洲時無限風煙皆自悲莫辭貧賤隔心期家住洲頭定近逺朝泛輕橈暮當返不能隨爾卧芳洲自念天機一何淺澧水送鄭豐鄠縣讀書麥秋中夏涼風起送君西郊及澧水孤煙逺樹動離心隔岸江流若千里早年江海謝浮名此路雲山愜爾情上古全經皆在口秦人如見濟南生登山歌青山前青山後登髙望兩處兩處今何有煙景滿川原離人堪白首雜言無錫惠山寺流泉歌寺有泉兮泉在山鏘金鳴玉兮長潺潺作潭鏡兮澄寺內泛巖花兮到人間土膏脈動知春早隈隩隂深長苔草處處縈回石磴喧朝朝盥潄山僧老僧自老松自新流活活無冬春任疏鑿兮任汲引若有意兮山中人偏依佛界通仙境明滅玲瓏媚林嶺宛如太室臨九潭詎減天台望三井我來結綬未經秋已厭微官憶舊逰且復遲回猶未去此心秪為靈泉留送包佶賦得天津橋洛陽歲暮作征客相望依然一水間相思已如千里隔晴煙霽景滿天心鳯閣龍樓映水濵豈無朝夕軒車度其奈相逄非所親鞏樹甘陵愁逺道他鄉一望人堪老君報還期在早春橋邊日日看芳草廬山歌送至弘法師兼呈薛江州釋子去兮訪名山禪舟容與兮住仍前猿啾啾兮怨月江渺渺兮多煙東林西林兮入何處上方下方兮通石路連湘接楚饒桂花事久年深無杏樹使君愛人兼愛山時引雙旌萬木間政成人野皆不擾遂令法侣性安間送陸潛夫往茅山賦得華陽洞離騷體遊仙洞兮訪真官奠瑶席兮禮石壇忽髣佛兮雲擾杳隂深兮夏寒欲迥頭兮揮手便辭家兮可否有婚姻兮嬰纏綿歸來兮已久酬權器南望江南滿山雪此情惆悵將誰説徒隨群吏不曽間顧與諸生為久别聞君靜坐轉耽書種樹葺茅還舊居終日白雲應自足明年芳草又何如人生有懷若不展出入公門猶未免回舟朝夕待春風先報華陽洞深淺
