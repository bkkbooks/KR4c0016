front:
  text: 唐皇甫冉詩集卷之五
  hash: sha256:109b8d56a9eabf2e159da4b526867271bcb07906154aed4beff96f0c5c0d6574
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0016_SBCK_005-1a}
body:
  text: 唐𥙷闕潤州皇甫冉茂政著七言律詩三月三日義興李明府後亭泛舟江南煙景復如何聞道新亭更可過䖏䖏蓻蘭春浦緑萋萋藉草遠山多壼觴湏就陶彭澤時俗猶傳晋永和更使輕橈徐轉去㣲風落日水増波送李錄事赴饒州北人南去雪紛紛鴈叫汀沙不可聞積水長天随逺客荒城極浦足寒雲山從建業千峰断江至潯陽九派分借問督郵纔弱冠府中年少不如君秋夜有懐髙十五兼呈空和尚晚節聞君趍道深結茅栽樹近東林大師㡬度曽摩頂髙士何年遂發心北渚三更聞過鴈西城萬里動寒砧不見支公與玄度相思擁膝坐長吟玄元觀送李深李風還奉先華隂此去那知道路遥寒原紫府上迢迢莫持别酒傾瓊液乍唱離歌和鳯簫遠水東流浮落景繚垣西轉失行鑣華山秦塞長相憶無使音塵頓寂寥送錢塘路少府赴制舉公車待詔赴長安客裏新正阻舊歡遲日未能銷野雪晴花偏自犯江寒東溟道路通秦塞北闕威儀識漢官共許郄詵工射䇿恩榮請向一枝看酬張二倉曹楊子所居見寄兼呈韓郎中孤雲獨鶴自悠悠别後經年尚治舟漁父置詞相借問郎官能賦許依投折芳逺寄三春草乗興閑㸔萬里流莫恠杜門頻乞假不堪扶病拜龍樓使徃壽州淮路寄劉長卿榛草荒凉村落空驅馳卒歳亦何功蒹葭曙色蒼蒼逺蟋蟀秋聲䖏䖏同郷路遥知淮浦外故人多在楚雲東日夕煙霜那可道壽陽西去水無窮同温丹徒登萬歲樓高樓獨立一作上思依依極浦遥山合翠㣲江客不堪頻北顧塞鴻何事復南飛丹陽古渡寒煙積瓜歩空洲遠樹稀聞道王師猶轉戦誰能談笑觧重圍宿淮隂南樓酬常伯能淮隂日落上南樓喬木荒城古渡頭浦外野風𥘉入户窓中海月早知秋滄波一望知千里畫角三聲起百憂佇一作獨立分宵絶一作逺来客煩君歩履忽相求酬李𥙷闕十年歸客但心傷三徑無人已自荒夕宿靈臺伴煙月晨趨建禮逐衣裳偶因麋鹿随豊草謬荷鴛鵉借末行縱有諌書猶未献春風拂地日空長送崔使君赴壽州一見劉長卿集列郡專城分國憂彤䄡皂盖古諸侯仲華遇主年猶少公瑾論兵位㔾酬草色青青宜建隼蝉聲䖏䖏雜鳴騶千里相思如可見淮南木落早驚秋館陶李丞舊居盛名天下挹餘芳弃置終身不拜郎詞藻世傳平子賦園林人比鄭公郷門前墜葉浮秋水籬外寒皐帯夕陽日日青松成古木秪應來者爲心傷送袁郎中破賊北歸優詔親賢時獨稀中途紫綬換征衣黄香省闥登朝去楊僕樓船振旅歸萬里長聞隨戰角十年不得偃郊扉但將詞賦奉缺七字恩輝寄韋司直郎士元亦有此詩未詳誰作聞君感歎二毛𥘉舊友相邀萬里餘烽戌有時驚暫定甲兵何䖏可安居客来呉地星霜久家在平陵音信踈昨夜春風還入户登山臨水復何如彭祖井上公旌節在徐方舊井莓苔近寝堂訪古應知彭祖宅得仙何必葛洪郷清不共春池盥潄偏宜夏日長聞道延年如玉液欲將調鼎献明光秋日東郊作閑看秋水心無事卧對寒林一作松手自栽廬岳高僧留偈别茅山道士寄書来燕日社日辭巢去菊爲重陽冐雨開淺薄將何稱獻納岐臨終日自遲廻送張道士歸茅山謁李尊師向山獨有一人行近洞應逄䨇鶴迎常以素書傳子弟還因白石號先生無窮杏樹行時種㡬許芝田向月耕師事少君年歲久欲随旌節徃層城送孔巢父赴河南軍江城相送阻煙波况復新秋一鴈過聞道全師征北虜更言諸將㑹南河邊心杳杳郷人絶塞草青青戰馬多共許陳琳工奏記知君名䆠未蹉跎招隠寺送聞判官還江州離别那逢秋氣悲東林更作上方期共知客路浮雲外暫愛僧房墜葉時長江九派人歸少寒嶺千重鴈度遲借問潯陽在何處每看潮落一相思李二侍御丹陽東去新亭姑蘇東望海陵間㡬度裁書信未還長在府中持白簡豈知天畔有青山人歸極浦寒流廣鴈下平蕪秋野閑舊日新亭更携手他郷風景亦相關
