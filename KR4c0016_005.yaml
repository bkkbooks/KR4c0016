front:
  text: 唐皇甫冉詩集卷之五
  hash: sha256:109b8d56a9eabf2e159da4b526867271bcb07906154aed4beff96f0c5c0d6574
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0016_SBCK_005-1a}
body:
  text: 唐𥙷闕潤州皇甫冉茂政著七言律詩三月三日義興李明府後亭泛舟江南煙景復如何聞道新亭更可過處處蓻蘭春浦緑萋萋藉草遠山多壼觴須就陶彭澤時俗猶傳晋永和更使輕橈徐轉去微風落日水增波送李録事赴饒州北人南去雪紛紛鴈叫汀沙不可聞積水長天隨逺客荒城極浦足寒雲山從建業千峰斷江至潯陽九派分借問督郵才弱冠府中年少不如君秋夜有懷髙十五兼呈空和尚晚節聞君趍道深結茅栽樹近東林大師幾度曽摩頂髙士何年遂發心北渚三更聞過鴈西城萬里動寒砧不見支公與玄度相思擁膝坐長吟玄元觀送李深李風還奉先華隂此去那知道路遙寒原紫府上迢迢莫持别酒傾瓊液乍唱離歌和鳯簫遠水東流浮落景繚垣西轉失行鑣華山秦塞長相憶無使音塵頓寂寥送錢塘路少府赴制舉公車待詔赴長安客裏新正阻舊歡遲日未能銷野雪晴花偏自犯江寒東溟道路通秦塞北闕威儀識漢官共許郤詵工射䇿恩榮請向一枝看酬張二倉曹楊子所居見寄兼呈韓郎中孤雲獨鶴自悠悠别後經年尚治舟漁父置詞相借問郎官能賦許依投折芳逺寄三春草乘興間看萬里流莫怪杜門頻乞假不堪扶病拜龍樓使往壽州淮路寄劉長卿榛草荒凉村落空驅馳卒歲亦何功蒹葭曙色蒼蒼逺蟋蟀秋聲處處同鄉路遙知淮浦外故人多在楚雲東日夕煙霜那可道壽陽西去水無窮同溫丹徒登萬歲樓高樓獨立一作上思依依極浦遙山合翠微江客不堪頻北顧塞鴻何事復南飛丹陽古渡寒煙積瓜步空洲遠樹稀聞道王師猶轉戰誰能談笑解重圍宿淮隂南樓酬常伯能淮隂日落上南樓喬木荒城古渡頭浦外野風𥘉入户窗中海月早知秋滄波一望知千里畫角三聲起百憂佇一作獨立分宵絶一作逺來客煩君步履忽相求酬李𥙷闕十年歸客但心傷三徑無人已自荒夕宿靈臺伴煙月晨趨建禮逐衣裳偶因麋鹿隨豐草謬荷鴛鵉借末行縱有諌書猶未獻春風拂地日空長送崔使君赴壽州一見劉長卿集列郡專城分國憂彤䄡皂蓋古諸侯仲華遇主年猶少公瑾論兵位卩酬草色青青宜建隼蟬聲處處雜鳴騶千里相思如可見淮南木落早驚秋館陶李丞舊居盛名天下挹餘芳弃置終身不拜郎詞藻世傳平子賦園林人比鄭公鄉門前墜葉浮秋水籬外寒皋帶夕陽日日青松成古木秪應來者為心傷送袁郎中破賊北歸優詔親賢時獨稀中途紫綬換征衣黃香省闥登朝去楊僕樓船振旅歸萬里長聞隨戰角十年不得偃郊扉但將詞賦奉缺七字恩輝寄韋司直郎士元亦有此詩未詳誰作聞君感歎二毛𥘉舊友相邀萬里餘烽戌有時驚暫定甲兵何處可安居客來吳地星霜久家在平陵音信踈昨夜春風還入户登山臨水復何如彭祖井上公旌節在徐方舊井莓苔近寢堂訪古應知彭祖宅得仙何必葛洪鄉清不共春池盥潄偏宜夏日長聞道延年如玉液欲將調鼎獻明光秋日東郊作間看秋水心無事卧對寒林一作松手自栽廬嶽高僧留偈别茅山道士寄書來燕日社日辭巢去菊為重陽冒雨開淺薄將何稱獻納岐臨終日自遲回送張道士歸茅山謁李尊師向山獨有一人行近洞應逄雙鶴迎常以素書傳子弟還因白石號先生無窮杏樹行時種幾許芝田向月耕師事少君年歲久欲隨旌節往層城送孔巢父赴河南軍江城相送阻煙波况復新秋一鴈過聞道全師征北虜更言諸將㑹南河邊心杳杳鄉人絶塞草青青戰馬多共許陳琳工奏記知君名䆠未蹉跎招隱寺送聞判官還江州離别那逢秋氣悲東林更作上方期共知客路浮雲外暫愛僧房墜葉時長江九派人歸少寒嶺千重鴈度遲借問潯陽在何處每看潮落一相思李二侍御丹陽東去新亭姑蘇東望海陵間幾度裁書信未還長在府中持白簡豈知天畔有青山人歸極浦寒流廣鴈下平蕪秋野間舊日新亭更携手他鄉風景亦相關
